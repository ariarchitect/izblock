name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore solution apps
        run: |
          dotnet restore .\iz-matcher\IzMatcher.App\IzMatcher.App.csproj
          dotnet restore .\iz-archicad-placer\IzArchicadPlacer.App\IzArchicadPlacer.App.csproj

      - name: Publish release artifacts
        shell: pwsh
        run: .\build\publish-all.ps1

      - name: Package GitHub Release archives
        shell: pwsh
        run: .\build\package-github-release.ps1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .\artifacts\github-release\iz-matcher-win64.zip
            .\artifacts\github-release\iz-archicad-placer-win64.zip
            .\artifacts\github-release\IzAutoCADPlugin.bundle.zip
          generate_release_notes: true
